name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and Test with Maven
        run: ./mvnw clean package

      - name: Install Ansible
        if: success()
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook to Deploy
        if: success()
        run: |
          ansible-playbook -i hosts.yaml playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'

      - name: Send Email on Build Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Build Failed: ${{ github.repository }} (Commit: ${{ github.sha }})"
          body: |
            Hello,

            The GitHub Actions build failed for commit ${{ github.sha }} by ${{ github.actor }}.
            
            Please check the build console logs here:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: srengty@gmail.com,sopheapsothiphak@gmail.com
          from: GitHub Actions <no-reply@github.com>
