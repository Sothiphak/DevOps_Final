apiVersion: v1
kind: Pod
metadata:
  name: devops-final-pod
  labels:
    app: idcard-suite
spec:
  containers:
    - name: web-server
      image: demo-web:latest
      imagePullPolicy: Never
      ports:
        - name: http-port
          containerPort: 8080
        - name: ssh-port
          containerPort: 22
      env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://127.0.0.1:3306/A-SOPHEAP_Sothiphak-db?createDatabaseIfNotExist=true
        - name: SPRING_DATASOURCE_USERNAME
          value: root
        - name: SPRING_DATASOURCE_PASSWORD
          value: Hello@123
        - name: PORT
          value: "8080"

    - name: mysql-db
      image: mysql:8.0
      ports:
        - name: db-port
          containerPort: 3306
      env:
        - name: MYSQL_DATABASE
          value: "A-SOPHEAP_Sothiphak-db"
        - name: MYSQL_ROOT_PASSWORD
          value: "Hello@123"
---
apiVersion: v1
kind: Service
metadata:
  name: idcard-suite-service
spec:
  type: NodePort
  selector:
    app: idcard-suite
  ports:
    - name: website
      protocol: TCP
      port: 8443
      targetPort: 8080
      nodePort: 30443
    - name: ssh
      protocol: TCP
      port: 2222
      targetPort: 22
      nodePort: 30222
