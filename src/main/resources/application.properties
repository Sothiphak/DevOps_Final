spring.application.name=demo
server.port=${PORT:8082}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/idcard_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:idcard_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

idcard.upload.dir=uploads/photos